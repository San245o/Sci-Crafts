    .compass-glint { fill: rgba(255, 255, 255, 0.9); stroke: rgba(255, 255, 255, 0.78); stroke-linecap: round; stroke-width: 1; filter: drop-shadow(0 0 7px rgba(255, 255, 255, 0.6)); }
